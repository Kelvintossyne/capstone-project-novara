---
node_role: master

docker_daemon_config_overrides:
  log-opts:
    max-size: "50m"
    max-file: "3"

etcd_sysctl_params:
  vm.swappiness:             0
  vm.dirty_ratio:            40
  vm.dirty_background_ratio: 10
  net.core.somaxconn:        32768
  net.ipv4.tcp_max_syn_backlog: 16384

etcd_backup_s3_bucket: "{{ cluster_name }}-etcd-backups"
