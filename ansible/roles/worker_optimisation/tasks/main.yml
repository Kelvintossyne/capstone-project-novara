---
- name: Apply worker sysctl tuning
  ansible.posix.sysctl:
    name:        "{{ item.key }}"
    value:       "{{ item.value }}"
    state:       present
    reload:      true
    sysctl_file: /etc/sysctl.d/96-worker-tuning.conf
  loop: "{{ worker_sysctl_params | default({}) | dict2items }}"

- name: Pre-pull pause image (faster pod startup)
  command: ctr images pull registry.k8s.io/pause:3.9
  ignore_errors: true
  changed_when: false

- name: Create kubelet systemd drop-in dir
  file:
    path:  /etc/systemd/system/kubelet.service.d
    state: directory
    mode:  "0755"

- name: Configure kubelet for worker performance
  copy:
    dest: /etc/systemd/system/kubelet.service.d/20-worker-opts.conf
    mode: "0644"
    content: |
      [Service]
      Environment="KUBELET_EXTRA_ARGS=--max-pods=110 --serialize-image-pulls=false"
  notify:
    - Reload systemd
    - Restart kubelet
